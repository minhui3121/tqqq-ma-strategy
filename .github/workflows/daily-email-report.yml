name: Daily Email Report

on:
  schedule:
    - cron: "0 21 * * 1-5"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate run to 5:00 PM Montreal time
        id: gate
        run: |
          python - << 'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.now(ZoneInfo("America/Toronto"))
          should_run = now.hour == 17

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"should_run={'true' if should_run else 'false'}\n")
              f.write(f"montreal_time={now.isoformat()}\n")
          PY

      - name: Print current Montreal time
        run: echo "Montreal time is ${{ steps.gate.outputs.montreal_time }}"

      - name: Send daily email report
        if: steps.gate.outputs.should_run == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: |
          python daily_email_report.py
